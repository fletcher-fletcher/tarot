services:
  - type: web
    name: tarot-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tarot-db
          property: connectionString
    autoDeploy: true

databases:
  - name: tarot-db
    databaseName: tarot_bot
    user: tarot_user
    plan: free
